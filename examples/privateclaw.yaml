#cloud-config
package_update: true
packages:
  - openssh-server
  - curl
  - git
  - build-essential
  - gcc
  - libc6-dev
  - jq
  - ufw
  - tpm2-tools
  - libtss2-tctildr0
users:
  - name: claw
    groups: sudo
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
runcmd:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get -y purge needrestart || true

  # -- Set hostname --
  - hostnamectl set-hostname privateclaw

  # -- libnss-ato: any SSH username maps to claw --
  - cd /tmp && git clone https://github.com/donapieppo/libnss-ato.git && cd libnss-ato && make && make install
  - cp /usr/lib/libnss_ato.so.2 /lib/x86_64-linux-gnu/libnss_ato.so.2 || cp /usr/lib/libnss_ato-2.3.6.so /lib/x86_64-linux-gnu/libnss_ato.so.2
  - ldconfig
  - grep '^claw:' /etc/passwd > /etc/libnss-ato.conf
  - |
    sed -i 's/^passwd:.*/passwd: files ato/' /etc/nsswitch.conf
  - |
    sed -i 's/^group:.*/group: files ato/' /etc/nsswitch.conf
  - |
    sed -i 's/^shadow:.*/shadow: files ato/' /etc/nsswitch.conf

  # -- sshd: serve claw's keys for any username --
  - printf '#!/bin/bash\ncat /home/claw/.ssh/authorized_keys\n' > /usr/local/bin/ssh-auth-keys
  - chmod +x /usr/local/bin/ssh-auth-keys
  - echo 'AuthorizedKeysCommand /usr/local/bin/ssh-auth-keys' >> /etc/ssh/sshd_config
  - echo 'AuthorizedKeysCommandUser root' >> /etc/ssh/sshd_config
  - systemctl restart sshd

  # -- OpenClaw: install as claw (install.sh needs $HOME set) --
  - su - claw -c "curl -fsSL https://openclaw.ai/install.sh | OPENCLAW_NO_ONBOARD=1 bash"
  # Ensure openclaw is in PATH for all SSH sessions (login + non-login shells)
  - echo 'export PATH="$HOME/.npm-global/bin:$PATH"' > /etc/profile.d/openclaw.sh
  - ln -sf /home/claw/.npm-global/bin/openclaw /usr/local/bin/openclaw
  # Enable lingering so claw's systemd services persist after logout
  - loginctl enable-linger claw
  - |
    GATEWAY_TOKEN=$(openssl rand -hex 16)
    sudo -u claw mkdir -p /home/claw/.openclaw
    cat > /home/claw/.openclaw/openclaw.json << OCEOF
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "auth": {
          "mode": "token",
          "token": "$GATEWAY_TOKEN"
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "lunal/Qwen/Qwen3.5-35B-A3B-FP8"
          },
          "compaction": {
            "mode": "safeguard"
          },
          "maxConcurrent": 4,
          "subagents": {
            "maxConcurrent": 8
          }
        }
      },
      "models": {
        "providers": {
          "lunal": {
            "api": "openai-completions",
            "baseUrl": "http://10.0.0.4:9090/v1",
            "apiKey": "not-needed",
            "models": [
              {
                "id": "Qwen/Qwen3.5-35B-A3B-FP8",
                "name": "Qwen/Qwen3.5-35B-A3B-FP8",
                "contextWindow": 32768,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "tools": {
        "profile": "coding"
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto",
        "restart": true
      },
      "session": {
        "dmScope": "per-channel-peer"
      }
    }
    OCEOF
    chown claw:claw /home/claw/.openclaw/openclaw.json
  # -- OpenClaw workspace instructions (injected into system prompt) --
  - |
    sudo -u claw mkdir -p /home/claw/.openclaw/workspace
    cat > /home/claw/.openclaw/workspace/OPENCLAW.md << 'INSTREOF'
    # Tool guidance

    ## Weather
    For weather queries, use the web_fetch tool to retrieve data from https://wttr.in/<location>?format=j1 (JSON) or https://wttr.in/<location> (text summary). Do NOT attempt to call a "weather" tool — it is not available.
    INSTREOF
    chown -R claw:claw /home/claw/.openclaw/workspace
  # -- OpenClaw gateway daemon: write systemd service file directly --
  # (openclaw daemon install requires a user D-Bus session which isn't
  #  available during cloud-init. We write the unit file ourselves.)
  - |
    ADMIN_UID=$(id -u claw)
    OCPATH="/home/claw/.npm-global/bin"
    OC_NODE=$(which node || echo /usr/bin/node)
    OC_ENTRY="/home/claw/.npm-global/lib/node_modules/openclaw/dist/index.js"
    OC_VER=$("$OC_NODE" -e "console.log(require('/home/claw/.npm-global/lib/node_modules/openclaw/package.json').version)" 2>/dev/null || echo "unknown")
    SVC_DIR="/home/claw/.config/systemd/user"
    mkdir -p "$SVC_DIR"
    cat > "$SVC_DIR/openclaw-gateway.service" << SVCEOF
    [Unit]
    Description=OpenClaw Gateway (v$OC_VER)
    After=network-online.target
    Wants=network-online.target

    [Service]
    ExecStart=$OC_NODE $OC_ENTRY gateway --port 18789
    Restart=always
    RestartSec=5
    TimeoutStopSec=30
    TimeoutStartSec=30
    SuccessExitStatus=0 143
    KillMode=control-group
    Environment=HOME=/home/claw
    Environment=TMPDIR=/tmp
    Environment=PATH=/usr/bin:$OCPATH:/home/claw/.local/bin:/usr/local/bin:/bin
    Environment=OPENCLAW_GATEWAY_PORT=18789
    Environment=OPENCLAW_SYSTEMD_UNIT=openclaw-gateway.service
    Environment=OPENCLAW_SERVICE_MARKER=openclaw
    Environment=OPENCLAW_SERVICE_KIND=gateway
    Environment=OPENCLAW_SERVICE_VERSION=$OC_VER

    [Install]
    WantedBy=default.target
    SVCEOF
    chown -R claw:claw "$SVC_DIR"
    # Enable and start: runuser with explicit D-Bus/XDG addresses the user's systemd instance
    runuser -l claw -c "export XDG_RUNTIME_DIR=/run/user/$ADMIN_UID DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$ADMIN_UID/bus && systemctl --user daemon-reload && systemctl --user enable openclaw-gateway.service && systemctl --user start openclaw-gateway.service" || true

  # -- Caddy: TLS reverse proxy for OpenClaw gateway --
  # Installed at boot but not started until claim (needs DNS name for cert).
  - |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
    apt-get update
    apt-get install -y caddy
    systemctl disable caddy
    systemctl stop caddy

  # -- PrivateClaw CLI + attestation tooling --
  - mkdir -p /etc/privateclaw
  - |
    export PRIVATECLAW_VERSION="v1.1.0"
    export ATTESTATION_CLI_VERSION="v0.4.1"
    curl -fsSL "https://github.com/lunal-dev/privateclaw-cli/releases/download/v1.1.0/install.sh" | bash
  - |
    cat > /etc/privateclaw/inference.conf << EOF
    PROXY_BASE_URL=http://10.0.0.4:9090
    LUNAL_MODEL=Qwen/Qwen3.5-35B-A3B-FP8
    VM_USER=claw
    EOF
  - privateclaw attest

  # -- Firewall: allow SSH from internet, block VNet private range --
  - ufw default allow outgoing
  - ufw default deny incoming
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw deny from 10.0.0.0/24 to any port 22
  - echo "y" | ufw enable

  # -- Block IMDS access (prevents metadata leakage) --
  - iptables -A OUTPUT -d 169.254.169.254 -j DROP
  - ip6tables -A OUTPUT -d fe80::1234:5678:abcd -j DROP

  # -- waagent: mask on prod (defense-in-depth against az vm run-command) --
  - systemctl stop walinuxagent || true
  - systemctl disable walinuxagent || true
  - systemctl mask walinuxagent || true

  # -- Assignment agent: privateclaw assign is installed via install.sh above --

  # -- Assignment agent systemd service --
  - |
    cat > /etc/systemd/system/privateclaw-assign.service << 'SVCEOF'
    [Unit]
    Description=PrivateClaw Assignment Agent
    After=network-online.target cloud-final.service
    Wants=network-online.target

    [Service]
    Type=oneshot
    ExecStart=/usr/local/bin/privateclaw assign
    RemainAfterExit=yes
    SVCEOF
  - |
    cat > /etc/systemd/system/privateclaw-assign-watcher.service << 'WATCHEOF'
    [Unit]
    Description=PrivateClaw Assignment Watcher
    After=network-online.target cloud-final.service
    Wants=network-online.target

    [Service]
    Type=simple
    ExecStart=/bin/bash -c 'while true; do /usr/local/bin/privateclaw assign && break; sleep 5; done'
    Restart=on-failure
    RestartSec=10
    WATCHEOF
  - |
    cat > /etc/systemd/system/privateclaw-assign-watcher.timer << 'TIMEREOF'
    [Unit]
    Description=Poll for PrivateClaw assignment

    [Timer]
    OnBootSec=30
    OnUnitActiveSec=10

    [Install]
    WantedBy=timers.target
    TIMEREOF
  - systemctl daemon-reload
  - systemctl enable privateclaw-assign-watcher.timer
  - systemctl start privateclaw-assign-watcher.timer

  # -- Default MOTD (pre-assignment -- OpenClaw is already configured and running) --
  - |
    cat > /etc/motd << 'MOTDEOF'

      +----------------------------------------------------------+
      |                                                          |
      |  Welcome to PrivateClaw                                  |
      |  Running in a Trusted Execution Environment (SEV-SNP)    |
      |  with end-to-end private inference                       |
      |                                                          |
      |  Verify your TEE:                                        |
      |    $ privateclaw verify                                  |
      |                                                          |
      |  Get started:                                            |
      |    $ openclaw onboard                                    |
      |    $ openclaw tui                                        |
      |                                                          |
      +----------------------------------------------------------+

    MOTDEOF
