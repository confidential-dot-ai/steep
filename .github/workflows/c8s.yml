# Build + publish the c8s confidential node image (TDX-measured, RKE2 +
# nri-image-policy + NVIDIA GPU stack baked into the verity rootfs).
# Output on GHCR: an oras artifact (disk.raw + uki.efi + manifest.json +
# roothash + OVMF) and a CDI-compatible single-layer image for the KubeVirt
# CDI importer.
#
# Manual / branch-scoped: the build is long (kernel compile + NVIDIA module
# build + ~3.5G of pinned artifacts) and privileged (mkosi sandbox needs
# sudo + userns) — not a per-push job.
#
# TODO(attest-gpu): C8S_STOCK_ATTEST=1 below composes the stock `attest`
# profile (attestation-api on :8400, TDX+SNP quotes) instead of
# `attest-gpu` (adds per-GPU SPDM evidence) because attest-gpu's
# mkosi.sync digest is still the Stage-4 sentinel and the pre-stage path
# (bin/steep-fetch-attest-gpu) needs a local attestation-rs build CI
# doesn't have. Once the attestation-rs `-gpu` image is published and
# pinned, drop the env var so the published image collects GPU evidence.
name: Build c8s Node Image

on:
  workflow_dispatch:
  push:
    branches:
      - ci/publish-c8s-image
    paths:
      - "kernel/*.config"
      - "kernel/config-x86_64.snapshot"
      - "kernel/version"
      - "mkosi/base/**"
      - "mkosi/initrd/**"
      - "mkosi/kernel-builder/**"
      - "bin/build-c8s"
      - "bin/steep-fetch-gpu"
      - "src/**"
      - "Cargo.*"
      - ".github/workflows/c8s.yml"

# Iterating pushes supersede each other; don't run two ~60-min builds.
concurrency:
  group: c8s-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image ref
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_ENV"

      - name: Free up disk space
        # kernel compile + NVIDIA userspace + rke2 airgap bundles + a ~6G
        # disk.raw are tight on the 14G hosted runner.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup mkosi
        uses: systemd/mkosi@v26

      - name: Install build deps (nspawn, TDVF firmware, iasl, cpio)
        # Host deps for `confos build` — keep in lockstep with bin/setup.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y systemd-container ovmf cpio acpica-tools

      - name: Cache kernel tools
        uses: actions/cache@v5
        with:
          path: mkosi/kernel-builder/mkosi.tools
          key: ${{ runner.os }}-tools-${{ hashFiles('mkosi/kernel-builder/mkosi.conf') }}

      # Keyed on the c8s fragment (not kernel/* like base.yml) so the c8s
      # kernel lineage doesn't thrash the base lineage's cache and vice
      # versa. Every input of confos's kernel fingerprint is in the key —
      # anything less restores a stale kernel that the fingerprint then
      # rejects, forcing a recompile whose result can never be saved under
      # the already-taken key. (hashFiles has no brace expansion; list files
      # individually.)
      - name: Cache kernel
        uses: actions/cache@v5
        with:
          path: output/kernel
          key: ${{ runner.os }}-kernel-c8s-${{ hashFiles('mkosi/kernel-builder/mkosi.conf','kernel/c8s.config','kernel/required.config','kernel/hardening.config','kernel/confidential.config','kernel/config-x86_64.snapshot','kernel/version','bin/build-c8s') }}

      # Distinct key prefix from base.yml: the c8s build's profiles add
      # ToolsTreePackages (oras, jq, curl), so the tree differs from the
      # base build's under what would otherwise be the same key.
      - name: Cache base image tools
        uses: actions/cache@v5
        with:
          path: |
            mkosi/base/mkosi.tools
            mkosi/base/mkosi.tools.manifest
          key: ${{ runner.os }}-c8s-tools-${{ hashFiles('mkosi/base/mkosi.conf.d/tools.conf','mkosi/base/mkosi.profiles/*/mkosi.conf') }}

      # The c8s profile's mkosi.sync downloads ~3.5G of pinned artifacts
      # (rke2 tarball + airgap bundles) into mkosi.pkgcache/c8s and verifies
      # by sha256 on reuse — cache it keyed on the pins. restore-keys makes
      # any sync edit a partial re-download instead of a full one (stale
      # entries are sha-verified, so restoring an old cache is safe).
      - name: Cache c8s artifact downloads
        uses: actions/cache@v5
        with:
          path: mkosi/base/mkosi.pkgcache/c8s
          key: ${{ runner.os }}-c8s-artifacts-${{ hashFiles('mkosi/base/mkosi.profiles/c8s/mkosi.sync') }}
          restore-keys: |
            ${{ runner.os }}-c8s-artifacts-

      # bin/steep-fetch-gpu pulls ~500MB of NVIDIA artifacts into
      # output/gpu/cache and sha-verifies on reuse — keyed on the script,
      # which carries the version + sha pins.
      - name: Cache NVIDIA driver downloads
        uses: actions/cache@v5
        with:
          path: output/gpu/cache
          key: ${{ runner.os }}-gpu-artifacts-${{ hashFiles('bin/steep-fetch-gpu') }}

      - name: Build c8s image
        env:
          C8S_STOCK_ATTEST: "1"   # see TODO(attest-gpu) in the header
        run: bin/build-c8s

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      # Skip the multi-GB push when the rootfs is byte-identical to what's
      # already published: the verity roothash is a content hash of the
      # entire rootfs. The :c8s artifact stores roothash as its own titled
      # layer, so the published value is a few-KB blob fetch. Best-effort —
      # any miss falls through to publishing.
      - name: Check whether the rootfs changed
        id: changed
        run: |
          set -uo pipefail
          new=$(cat output/c8s/roothash 2>/dev/null || echo new)
          digest=$(oras manifest fetch "${IMAGE}:c8s" 2>/dev/null \
                     | jq -r '.layers[] | select(.annotations["org.opencontainers.image.title"] == "roothash") | .digest' \
                     || true)
          pub=none
          if [ -n "$digest" ]; then
            pub=$(oras blob fetch --output - "${IMAGE}@${digest}" 2>/dev/null || echo none)
          fi
          echo "new=$new published=$pub"
          if [ "$new" = "$pub" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "rootfs roothash unchanged ($new) — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to GHCR
        if: steps.changed.outputs.skip != 'true'
        run: |
          set -eux
          SHORT_SHA="${GITHUB_SHA::7}"

          # confos push passes the tag list into the oras ref verbatim, so
          # one invocation covers both tags (one CDI tarball build, one
          # layer upload).
          #
          # CDI-compatible single-layer image first (disk.raw under disk/,
          # for the KubeVirt CDI registry importer), the :c8s artifact
          # (per-file layers, for verifiers and `confos pull`) last: the
          # change-check above reads :c8s, so a partial failure here leaves
          # it stale and the next run re-publishes everything.
          bin/confos push output/c8s --cdi \
            --registry "$IMAGE" \
            --tag "c8s-cdi,c8s-cdi-${SHORT_SHA}"
          bin/confos push output/c8s \
            --registry "$IMAGE" \
            --tag "c8s,c8s-${SHORT_SHA}"

      - name: Summary
        run: |
          {
            echo "### c8s confidential node image"
            echo "- artifact: \`${IMAGE}:c8s\`"
            echo "- CDI image: \`${IMAGE}:c8s-cdi\`"
            echo ""
            echo "Launch as a TDX CVM with a serial=confai-scratch disk (>=64G),"
            echo "expose 6443, then \`c8s install --distro rke2\`. See docs/C8S-IMAGE.md."
          } >> "$GITHUB_STEP_SUMMARY"
