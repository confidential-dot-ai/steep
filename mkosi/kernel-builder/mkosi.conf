[Config]
MinimumVersion=26

[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe
# TEMP(2026-07-06): snapshot.ubuntu.com outage — undo both mirrors to https://snapshot.ubuntu.com/ubuntu/20260405T000000Z
Mirror=https://archive.ubuntu.com/ubuntu

[Build]
Incremental=false
ToolsTree=default
ToolsTreeDistribution=ubuntu
ToolsTreeRelease=resolute
ToolsTreeMirror=https://archive.ubuntu.com/ubuntu

[Content]
Bootable=false
SourceDateEpoch=0
CleanPackageMetadata=yes
WithDocs=false
Packages=
    bash
    bc
    binutils
    bison
    coreutils
    cpio
    curl
    findutils
    flex
    gcc
    # GCC plugin headers — required for the KSPP GCC-plugin options in
    # kernel/hardening.config (GCC_PLUGIN_LATENT_ENTROPY, GCC_PLUGIN_STACKLEAK,
    # RANDSTRUCT_FULL). Without these headers Kconfig hides the GCC_PLUGINS
    # menu and olddefconfig silently drops those options. Must match the
    # gcc major version in the tools tree (gcc-15 on ubuntu resolute).
    gcc-15-plugin-dev
    # GCC plugins are host C++ programs built with HOSTCXX (g++); the base
    # tools tree ships only gcc, so g++ is required to compile the plugin .so.
    g++
    grep
    gzip
    libelf-dev
    libssl-dev
    make
    perl
    rsync
    sed
    tar
    util-linux
    xz-utils

[Output]
Format=directory
OutputDirectory=mkosi.output
Seed=d4f09d27-7e4e-4b1a-9c3a-deadbeef0003
