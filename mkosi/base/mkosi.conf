[Config]
MinimumVersion=26

[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe
# Pin apt mirror to a point-in-time snapshot for reproducible builds.
# Bump this timestamp deliberately to pick up security updates.
Mirror=https://snapshot.ubuntu.com/ubuntu/20260405T000000Z

[Build]
Incremental=false
ToolsTree=default
EnvironmentFiles=mkosi.env

[Content]
Bootable=true
SourceDateEpoch=0
CleanPackageMetadata=yes
WithDocs=false
Timezone=UTC
Ssh=never
Packages=
    apt
    bash
    ca-certificates
    cloud-init
    cloud-guest-utils
    conntrack
    curl
    dbus-broker
    dpkg
    ethtool
    gpgv
    grep
    gzip
    iproute2
    kmod
    libseccomp2
    linux-generic
    login
    mount
    openssh-server
    polkitd
    sed
    socat
    sudo
    systemd
    systemd-boot
    systemd-boot-efi
    systemd-resolved
    systemd-sysv
    tzdata
    udev
    util-linux
KernelCommandLine=console=ttyS0 earlyprintk=serial systemd.condition-first-boot=no
KernelModulesInitrd=yes
KernelModulesInitrdInclude=
    dm-bufio
    dm-verity
    erofs
    overlay
    virtio_blk
    virtio_net
    virtio_pci

[Output]
Format=disk
Seed=d4f09d27-7e4e-4b1a-9c3a-deadbeef0001
SplitArtifacts=uki,roothash

[Validation]
Checksum=yes

[Runtime]
TPM=false
Firmware=uefi
VSock=false
