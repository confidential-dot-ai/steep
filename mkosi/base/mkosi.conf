[Config]
MinimumVersion=26

[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe
# Pin apt mirror to a point-in-time snapshot for reproducible builds.
# Bump this timestamp deliberately to pick up security updates.
# TEMP(2026-07-06): snapshot.ubuntu.com outage — undo both mirrors to https://snapshot.ubuntu.com/ubuntu/20260430T000000Z
Mirror=https://archive.ubuntu.com/ubuntu

[Build]
EnvironmentFiles=mkosi.env
Incremental=false
ToolsTree=default
ToolsTreeDistribution=ubuntu
ToolsTreeRelease=resolute
ToolsTreeMirror=https://archive.ubuntu.com/ubuntu

[Content]
Bootable=true
SourceDateEpoch=0
CleanPackageMetadata=yes
WithDocs=false
Timezone=UTC
Ssh=never
Packages=
    apt
    bash
    ca-certificates
    cloud-init
    cloud-guest-utils
    conntrack
    curl
    dbus-broker
    dpkg
    ethtool
    gpgv
    grep
    gzip
    iproute2
    kmod
    libseccomp2
    login
    mount
    polkitd
    sed
    socat
    sudo
    systemd
    systemd-boot
    systemd-boot-efi
    systemd-resolved
    systemd-sysv
    tzdata
    udev
    util-linux
# No `console=` in the base cmdline.
#
# `console=<name>` in the cmdline routes kernel printk to <name> AND tells
# systemd to expect a working primary console. Under KubeVirt v1.9's default
# VMI device layout, no virtio-console device is attached (only isa-serial
# for ttyS0 + a virtio-serial channel for the guest-agent), so `console=hvc0`
# names a device that never registers. The kernel/systemd stack blocks on
# the missing console during early boot — the guest never reaches
# multi-user.target, network never comes up, no packets ever leave the
# guest. `confos run` under raw QEMU worked because it explicitly attaches a
# virtconsole to hvc0.
#
# Leaving `console=` unset means the kernel doesn't route printk anywhere
# and doesn't wait on a missing device. `confos run` still works because
# systemd's serial-getty@hvc0.service enables agetty on /dev/hvc0 whenever
# the device exists at runtime, independent of the cmdline. KubeVirt hosts
# work because there's nothing to wait for. The dev profile re-adds
# `console=ttyS0 console=hvc0` for observability when a developer opts in.
#
# Attack-surface note: this REDUCES surface. Not routing printk to a serial
# port means the host can't read guest kernel messages in either the
# KubeVirt or raw-QEMU case. The dev profile is the explicit opt-in for
# host-visible boot logs.
# page_alloc.shuffle=1: CONFIG_SHUFFLE_PAGE_ALLOCATOR only makes page
# free-list shuffling *available* — without this param (or memory-side
# caches, which VMs don't have) it stays inert. See the KSPP block in
# kernel/hardening.config.
KernelCommandLine=systemd.condition-first-boot=no page_alloc.shuffle=1

[Output]
Format=disk
Seed=d4f09d27-7e4e-4b1a-9c3a-deadbeef0001
SplitArtifacts=uki,roothash

[Validation]
Checksum=yes

[Runtime]
TPM=false
Firmware=uefi
VSock=false
