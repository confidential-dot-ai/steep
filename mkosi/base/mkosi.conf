[Config]
MinimumVersion=26

[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe
# Pin apt mirror to a point-in-time snapshot for reproducible builds.
# Bump this timestamp deliberately to pick up security updates.
Mirror=https://snapshot.ubuntu.com/ubuntu/20260430T000000Z

[Build]
EnvironmentFiles=mkosi.env
Incremental=false
ToolsTree=default
ToolsTreeDistribution=ubuntu
ToolsTreeRelease=resolute
ToolsTreeMirror=https://snapshot.ubuntu.com/ubuntu/20260430T000000Z

[Content]
Bootable=true
SourceDateEpoch=0
CleanPackageMetadata=yes
WithDocs=false
Timezone=UTC
Ssh=never
Packages=
    apt
    bash
    ca-certificates
    cloud-init
    cloud-guest-utils
    conntrack
    curl
    dbus-broker
    dpkg
    ethtool
    gpgv
    grep
    gzip
    iproute2
    kmod
    libseccomp2
    login
    mount
    polkitd
    sed
    socat
    sudo
    systemd
    systemd-boot
    systemd-boot-efi
    systemd-resolved
    systemd-sysv
    tzdata
    udev
    util-linux
# Two consoles so the image works under both:
#   - `steep run` / raw QEMU with `-nographic`: uses virtio-console (hvc0)
#   - KubeVirt: only exposes an ISA serial port (ttyS0) via virt-launcher
# The kernel writes early-boot lines to every listed console; the last one
# becomes /dev/console for userspace. Putting ttyS0 last keeps `steep run`
# interactive (the user expects to see hvc0 prompts) while still surfacing
# any panic on the KubeVirt-visible serial log.
KernelCommandLine=console=hvc0 console=ttyS0 systemd.condition-first-boot=no

[Output]
Format=disk
Seed=d4f09d27-7e4e-4b1a-9c3a-deadbeef0001
SplitArtifacts=uki,roothash

[Validation]
Checksum=yes

[Runtime]
TPM=false
Firmware=uefi
VSock=false
