[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe

[Build]
Incremental=true
ToolsTree=default

[Content]
Bootable=true
CleanPackageMetadata=yes
WithDocs=false
Timezone=UTC
Ssh=never
Autologin=true
Packages=
    apt
    bash
    cloud-init
    cloud-guest-utils
    curl
    dbus-broker
    diffutils
    dpkg
    gawk
    git
    gnupg
    grep
    gzip
    iproute2
    iputils-ping
    kmod
    less
    libseccomp2
    linux-azure
    login
    mount
    vim
    openssh-server
    polkitd
    sed
    systemd
    systemd-boot
    systemd-boot-efi
    systemd-coredump
    systemd-resolved
    systemd-sysv
    tpm2-tools
    tzdata
    udev
    util-linux

[Output]
Format=disk

[Validation]
Checksum=yes

[Runtime]
TPM=false
Firmware=uefi
VSock=false
