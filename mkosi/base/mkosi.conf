[Config]
MinimumVersion=26

[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe

[Build]
Incremental=true
ToolsTree=default

[Content]
Bootable=true
CleanPackageMetadata=yes
WithDocs=false
Timezone=UTC
Ssh=never
Autologin=true
Packages=
    apt
    bash
    cloud-init
    cloud-guest-utils
    curl
    dbus-broker
    diffutils
    dpkg
    gawk
    git
    gnupg
    grep
    gzip
    iproute2
    iputils-ping
    kmod
    less
    libseccomp2
    linux-generic
    login
    mount
    vim
    openssh-server
    polkitd
    sed
    sudo
    systemd
    systemd-boot
    systemd-boot-efi
    systemd-coredump
    systemd-resolved
    systemd-sysv
    tpm2-tools
    tzdata
    udev
    util-linux
    ca-certificates
    build-essential
    pkg-config
    libssl-dev
KernelCommandLine=console=ttyS0 earlyprintk=serial systemd.condition-first-boot=no
MicrocodeHost=yes
KernelModulesInitrd=yes
KernelModulesInitrdInclude=
    dm-verity
    dm-bufio
    overlay
    virtio_blk
    virtio_pci
    virtio_net
    ext4

[Output]
Format=disk
SplitArtifacts=uki,roothash

[Validation]
Checksum=yes

[Runtime]
TPM=false
Firmware=uefi
VSock=false
