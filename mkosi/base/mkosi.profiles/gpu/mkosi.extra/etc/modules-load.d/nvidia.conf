# Load the baked NVIDIA modules at boot via systemd-modules-load.service.
# The signed .ko files live in the dm-verity root at
# /usr/lib/modules/<kver>/kernel/drivers/video/ (staged by bin/steep-fetch-gpu,
# resolved by depmod). On a GPU-less boot these load harmlessly and bind
# nothing. nvidia_uvm depends on nvidia; listing both is explicit and order-
# independent (modprobe resolves the dependency).
nvidia
nvidia_uvm
