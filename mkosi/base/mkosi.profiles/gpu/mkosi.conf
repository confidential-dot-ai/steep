# Profile: gpu
#
# Turns the base confidential-VM image into an NVIDIA GPU image: it boots with
# B200s passed through, loads the baked (measured) driver, and brings the GPUs
# to confidential-compute Ready state — with no in-guest driver install, no
# DKMS, and no network. See docs/GPU-IMAGE-PLAN.md.
#
# This profile carries only the small pieces: a couple of host tools, the
# systemd units that drive the boot-time GPU bring-up, and a preset to enable
# them. The heavy artifacts — the signed nvidia.ko/nvidia-uvm.ko modules, the
# NVIDIA userspace (libnvidia-ml, nvidia-smi, nvidia-persistenced,
# nvidia-modprobe) and the GSP firmware — are staged into mkosi.local by
# `bin/steep-fetch-gpu`, which MUST run before `steep build --profile gpu`
# (the `build-gpu` Make target chains them). Building those here is impossible:
# the modules need the kernel tree + toolchain that only exist outside this
# sandbox.
#
# Compose with `attest-gpu` to also serve GPU attestation evidence:
#   bin/steep build --profile gpu --profile attest-gpu \
#       --kernel-config-fragment kernel/gpu.config
#
# MEASUREMENT NOTE: this profile requires the modules-enabled kernel built with
# kernel/gpu.config, which has a DIFFERENT measurement than the base kernel
# (CONFIG_MODULES flips on). A gpu image is therefore a distinct attestation
# identity from the CPU-only base — expected and intended.

[Content]
Packages=
    # kmod: modprobe/depmod at runtime (systemd-modules-load loads nvidia).
    kmod
    # pciutils: lspci, for operators debugging GPU passthrough in the guest.
    pciutils
