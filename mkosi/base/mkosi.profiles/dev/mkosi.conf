# Profile: dev
#
# Bundle of debug affordances that make an in-flight guest observable and
# poke-able. Selecting this profile changes the image measurement, so a
# --profile=dev build is not the same image as its non-dev counterpart —
# hence a distinct RTMR / launch digest and, in practice, a separate
# attestation policy. Do NOT ship production images with this on.
#
# What it turns on:
#   - Appends `console=ttyS0` to the measured kernel cmdline so the KubeVirt
#     `virtctl console` / `guest-console-log` path (which bridges ttyS0, not
#     virtio hvc0) surfaces kernel + initrd + boot output. `steep run` keeps
#     working because hvc0 stays last in the console= list (see below).
#   - Drops a passwordless-root autologin on every serial getty
#     (mkosi.extra/etc/systemd/system/serial-getty@.service.d/autologin.conf).
#
# What the profile can NOT do on its own: enable kernel drivers. Guest kernel
# config is a separate build input (kernel/*.config → --kernel-config-fragment).
# The hardened base disables CONFIG_SERIAL_8250 for attack-surface reduction,
# so ttyS0 is inert until the kernel has the 8250 driver. Pair this profile
# with `--kernel-config-fragment kernel/dev.config` to re-enable it; both
# opt-ins are required to actually get logs on ttyS0.
#
# Security posture inversions bundled here (each is a deliberate hardening
# rollback for debugging, not required for production):
#   - passwordless-root autologin on serial getty
#   - kernel 8250 UART driver re-enabled (via the paired fragment)
#   - ttyS0 exposed in the measured kernel cmdline
#
# Under the SNP threat model the host controls the serial port; under the
# TDX threat model KubeVirt's virt-launcher-side serial socket is host-visible.
# Neither carries in-guest secret material by default, but the autologin
# means anyone with access to that host socket has a root shell.

[Content]
# KernelCommandLine is an append-merged list in mkosi, so a bare reset line
# first clears the base's value; the second line then sets the whole cmdline.
# Why the full line and not just `console=ttyS0`: order matters. Linux makes
# the LAST console= the /dev/console that systemd spawns the login getty on.
# hvc0 must stay last — `steep run` wires hvc0 as a virtio console and passes
# `-serial none` (no ttyS0 device), so if ttyS0 won /dev/console the
# interactive prompt would vanish under `steep run`. With hvc0 last,
# /dev/console = hvc0 for `steep run`, while ttyS0 still carries kernel+boot
# output for KubeVirt's serial console.
KernelCommandLine=
KernelCommandLine=console=ttyS0 console=hvc0 systemd.condition-first-boot=no
