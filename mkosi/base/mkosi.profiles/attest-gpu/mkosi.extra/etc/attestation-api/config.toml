# attestation-api config baked by `steep build --profile attest-gpu`.
# Identical in shape to the `attest` profile's config — there is NO GPU flag
# here. GPU evidence is requested per-call: POST /attest with
# {"nvidia_gpu": true, "report_data": "<>=16-byte base64 nonce>"}. The one
# caller nonce binds the TDX quote AND every GPU. Override at runtime by
# writing /etc/attestation-api/config.toml (persists on the overlay, does not
# change the measurement).

[server]
bind = "0.0.0.0:8400"

[server.tls]
enabled = false

[auth]
api_keys = []

[certs]
cache_max_entries = 1024
tdx_collateral_ttl_hours = 24
# NRAS JWKS for GPU EAT verification (only needed if this node also verifies;
# serving evidence does not require NRAS egress).
prefetch_nras_jwks = true

[token]
enabled = false

[attestation]
enabled = true
# vsock: fetch quotes from the host's QGS over AF_VSOCK (CID 2, port 4050) —
# the GPU-image kernel enables vsock for exactly this (kernel/gpu.config).
# The ConfigFS-TSM path also works but is far too slow for a serving endpoint
# (~1s+/quote); it remains the fallback if you set "auto". The launch stack
# must give the guest a vsock device (manual: -device vhost-vsock-pci;
# KubeVirt: autoattachVSOCK) and run QGS on the host.
tdx_quote_method = "vsock"
# GPU is NOT a platform here — it is a per-request add-on (see header).
platforms = ["tdx"]
