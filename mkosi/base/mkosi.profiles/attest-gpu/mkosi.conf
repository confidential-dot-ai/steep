# Profile: attest-gpu
#
# The `attest` profile's GPU-capable sibling. Bakes an attestation-api HTTP
# service that serves BOTH the TDX CPU quote AND NVIDIA per-GPU SPDM evidence,
# nonce-bound together: the caller's `report_data` goes into the TDX quote and
# derives each GPU's SPDM nonce (gpu_nonce = SHA256(nonce ‖ "NVIDIA-GPU-EAT-v1")),
# so one request attests the whole confidential GPU VM.
#
# Only meaningful composed WITH the `gpu` profile (it needs the baked NVIDIA
# driver + NVML + /dev/nvidia* nodes at runtime):
#   bin/steep build --profile gpu --profile attest-gpu \
#       --kernel-config-fragment kernel/gpu.config
#
# HOW THIS DIFFERS FROM `attest`
# -----------------------------
# The stock published attestation-api (used by `attest`) is built WITHOUT the
# `nvidia-gpu-attest` cargo feature, so it can VERIFY GPU bundles but not
# COLLECT them — `POST /attest {nvidia_gpu:true}` returns HTTP 400. This
# profile instead pulls a `-gpu` image built with `--features nvidia-gpu-attest`
# that bundles NVIDIA's libnvat.so evidence collector. Producing that image is
# Stage 4 (attestation-rs Dockerfile.gpu + a CI publish job); see
# docs/GPU-IMAGE-PLAN.md decision D9.
#
# >>> STAGE 4 BLOCKER: the pinned digest in mkosi.sync is a SENTINEL. This
# >>> profile cannot build until the attestation-rs `-gpu` image is published
# >>> and its digest filled in. The `gpu` profile alone is fully functional
# >>> without this one.

[Content]
Packages=
    ca-certificates
    # attestation-api links tpm2-tss at runtime even where unused (see the
    # `attest` profile for the full rationale on these exact package names).
    libtss2-esys-3.0.2-0t64
    libtss2-tctildr0t64
    # libstdc++.so.6 (also in base) — the C++ runtime libnvat needs. libnvat's
    # versioned ICU *and* libxml2.so.2 are NOT apt-installed here: resolute has
    # no plain `libxml2` package and its ICU major may not match what libnvat
    # was built against, so both are bundled alongside libnvat instead (see
    # bin/steep-fetch-attest-gpu). z/lzma/gcc_s come from the base.
    libstdc++6

[Build]
# oras + jq: the sync hook pulls the -gpu OCI image and extracts both the
# attestation-api binary and libnvat.so from its layers (see attest/mkosi.sync).
ToolsTreePackages=oras,jq
