# Profile: ssh
#
# Bakes an OpenSSH server into the image. Composable with other profiles —
# e.g. `bin/steep build --profile attest --profile ssh` produces the same
# image the attest profile used to produce before SSH was split out.
#
# SSH host keys are stripped from the final image to keep builds reproducible;
# the systemd-provided ssh-keygen-on-first-boot generator will recreate them
# on first boot (landing on the runtime overlay, unattested).

[Distribution]
Packages=
    openssh-server
