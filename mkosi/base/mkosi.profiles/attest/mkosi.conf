# Profile: attest
#
# Bakes an SEV-SNP attestation HTTP service into the image:
#   - /usr/local/bin/attestation-api  ← staged by this profile's mkosi.sync
#                                       hook, which pulls the binary from
#                                       GHCR (pinned by digest) before mkosi
#                                       copies extra trees into the image
#   - /etc/systemd/system/attestation-api.service (this dir's mkosi.extra)
#   - /etc/attestation-api/config.toml (this dir's mkosi.extra)
#
# The binary is part of the verity-protected rootfs, so its bytes are
# implicitly bound to the IGVM launch measurement — bumping the pinned
# digest in this profile's mkosi.sync produces a different launch digest.
#
# This profile does NOT add an SSH server. Reaching the attestation-api over
# HTTP doesn't require SSH; compose with the `ssh` profile if you want both
# (e.g. `bin/steep build --profile attest --profile ssh`).
#
# `oras` is added to the mkosi tools tree (NOT the final image) so the
# sync hook can pull the attestation-api OCI image from GHCR over the
# standard OCI Distribution Spec HTTP API without needing a container
# runtime daemon. oras is a self-contained registry client, unlike nerdctl
# which requires a containerd daemon.

[Content]
Packages=
    ca-certificates
    # attestation-api links against tpm2-tss (libtss2-esys / -tctildr /
    # -mu / -sys) at runtime, even on bare-metal where the TPM path isn't
    # used. Without these the binary exits 127 on the very first start
    # with `error while loading shared libraries: libtss2-esys.so.0`.
    # Ubuntu 24.04+ uses the t64 ABI-transition package names
    # (`libtss2-esys-3.0.2-0t64`), which pulls the other tss2 libs as
    # transitive deps. The older `libtss2-esys0` symbol still resolves
    # to the same .so.0 thanks to the package's binary-compat symlink.
    libtss2-esys-3.0.2-0t64
    # `tctildr` is the TCTI Loader Dispatcher — attestation-api links it
    # explicitly for runtime TCTI selection. libtss2-esys-3.0.2-0t64 only
    # pulls in esys/mu/sys; tctildr ships in its own t64 package and the
    # binary errors `libtss2-tctildr.so.0: cannot open shared object file`
    # without it.
    libtss2-tctildr0t64

[Build]
# oras: standalone OCI registry client (no daemon required) used by the
#       sync hook to pull the attestation-api OCI image from GHCR.
# jq:   used by the sync hook to parse the OCI manifest and select layer
#       digests for blob fetch. Not guaranteed to be in the mkosi default
#       tools tree, so request it explicitly here.
ToolsTreePackages=oras,jq
