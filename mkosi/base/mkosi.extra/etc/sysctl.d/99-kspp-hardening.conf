# KSPP (Kernel Self-Protection Project) recommended sysctls.
# https://kspp.github.io/Recommended_Settings
#
# Runtime-policy hardening that complements the compile-time settings in
# kernel/hardening.config. Applied late (99-) so it wins over distro drop-ins.
#
# Only the "safe" KSPP sysctls are set here. Deliberately omitted:
#
#   - Disruptive (would break steep workloads):
#       user.max_user_namespaces=0   (breaks unprivileged user namespaces)
#       kernel.yama.ptrace_scope=3   (blocks all ptrace, even for root)
#
#   - Already enforced (more strongly) at compile time. This group's
#     sysctl keys don't exist in this kernel, so setting them would only
#     log a write error at boot:
#       kernel.kexec_load_disabled   (CONFIG_KEXEC is off)
#       kernel.modules_disabled      (CONFIG_MODULES is off)
#       kernel.unprivileged_bpf_disabled / net.core.bpf_jit_harden
#                                    (CONFIG_BPF_SYSCALL / BPF_JIT are off)
#       vm.unprivileged_userfaultfd  (CONFIG_USERFAULTFD is off)
#       kernel.io_uring_disabled     (CONFIG_IO_URING is off)
#     These two keys DO exist (the tty sysctls register unconditionally
#     since 6.2), but their compiled-in defaults are already 0/disabled
#     because the backing feature is off:
#       dev.tty.legacy_tiocsti       (CONFIG_LEGACY_TIOCSTI is off)
#       dev.tty.ldisc_autoload       (CONFIG_LDISC_AUTOLOAD is off)

# Hide kernel pointers from unprivileged (and privileged) readers.
kernel.kptr_restrict = 2

# Restrict dmesg to root (pins CONFIG_SECURITY_DMESG_RESTRICT).
kernel.dmesg_restrict = 1

# Restrict perf_event_open(): no CPU-wide events (>0), no kernel
# profiling (>1). NOTE: the "3 = deny unprivileged perf entirely" level
# is a Debian/Android patch that upstream rejected — on this vanilla
# kernel any value >2 is stored but behaves exactly like 2, so
# unprivileged per-task userspace-only profiling still works. 3 is kept
# as a forward-compatible ceiling in case the kernel ever gains the
# stricter check; fully removing the surface would need
# CONFIG_PERF_EVENTS=n or a seccomp policy.
kernel.perf_event_paranoid = 3

# Full address-space layout randomization.
kernel.randomize_va_space = 2

# Reboot (panic) after a single WARN or oops rather than continuing in a
# potentially-compromised state.
kernel.warn_limit = 1
kernel.oops_limit = 1

# Symlink/hardlink/FIFO/regular-file creation protections in world-writable
# sticky dirs (defeats classic /tmp race and link-following attacks).
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Never generate core dumps for setuid/privileged processes.
fs.suid_dumpable = 0
