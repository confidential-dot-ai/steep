[Partition]
Type=root
CopyFiles=/
Verity=data
VerityMatchKey=root
### read-only for dm-verity
ReadOnly=yes
Minimize=best
Format=erofs
SectorSize=4096
SizeMinBytes=1G
### 16G ceiling for the c8s profile (rke2 + airgap bundles + NVIDIA
### userspace/firmware ≈ 5-6G of content). Minimize=best shrinks every
### image to its content, so this only raises the failure ceiling.
SizeMaxBytes=16G
